<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nicpu-F IDE</title>

<style>
body{
    margin:0;
    background:#111;
    color:#00ff88;
    font-family:monospace;
}

#topbar{
    background:#000;
    padding:10px;
    display:flex;
    gap:10px;
    border-bottom:1px solid #00ff88;
}

button{
    padding:8px 14px;
    background:#00ff88;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00cc66;
}

#main{
    display:flex;
    height:calc(100vh - 50px);
}

#editor{
    width:50%;
    border-right:1px solid #00ff88;
}

#right{
    width:50%;
    display:flex;
    flex-direction:column;
}

#output{
    flex:1;
    background:#000;
    color:#00ff88;
    padding:10px;
    overflow:auto;
    white-space:pre;
}

#error{
    height:140px;
    background:#000;
    color:#ff4444;
    padding:10px;
    overflow:auto;
    border-top:1px solid #00ff88;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="compileCode()">Compile</button>
</div>

<div id="main">
    <div id="editor"></div>

    <div id="right">
        <div id="output"></div>
        <div id="error"></div>
    </div>
</div>

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<script>

require.config({
    paths:{
        vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs"
    }
});

window.MonacoEnvironment = {
    getWorkerUrl:function(){
        return `data:text/javascript;charset=utf-8,
        self.MonacoEnvironment={
            baseUrl:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/'
        };
        importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/base/worker/workerMain.js');`;
    }
};

require(["vs/editor/editor.main"], function(){

    // ------------------------------------
    // LANGUAGE REGISTRATION
    // ------------------------------------
    monaco.languages.register({
        id: "nicpuf"
    });

    // ------------------------------------
    // SYNTAX HIGHLIGHTING
    // ------------------------------------
    monaco.languages.setMonarchTokensProvider("nicpuf", {

        tokenizer: {
            root: [

                [/\b(let|while|return|asm|read|write|text_out|text_out_line|text_out_var|text_clear|if)\b/, "keyword"],

                [/[+\-*\/=<>!]+/, "operator"],

                [/\b\d+\b/, "number"],

                [/\/\/.*$/, "comment"],

                [/[a-zA-Z_][a-zA-Z0-9_]*/, "identifier"],

                [/[{}]/, "delimiter.bracket"]
            ]
        }
    });

    // ------------------------------------
    // THEME
    // ------------------------------------
    monaco.editor.defineTheme("nicpufTheme", {

        base: "vs-dark",
        inherit: true,

        rules: [
            { token: "keyword", foreground: "00ff88" },
            { token: "number", foreground: "ffcc00" },
            { token: "comment", foreground: "666666" },
            { token: "operator", foreground: "ff4444" }
        ],

        colors: {
            "editor.background": "#111111"
        }
    });

    // ------------------------------------
    // AUTOCOMPLETE (F++ LANGUAGE)
    // ------------------------------------
    monaco.languages.registerCompletionItemProvider("nicpuf", {

        triggerCharacters: [" ", ".", "="],

        provideCompletionItems: function () {

            return {
                suggestions: [

                    // KEYWORDS
                    {
                        label: "let",
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: "let var = value;",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "while",
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: "while a < b {\n\t \n}",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },
                    {
                        label: "if",
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: "if a < b {\n\t \n}",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },
                    {
                        label: "return",
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: "return;"
                    },

                    {
                        label: "asm",
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: "asm inst A B C",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "read",
                        kind: monaco.languages.CompletionItemKind.Function,
                        insertText: "read var addr",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "write",
                        kind: monaco.languages.CompletionItemKind.Function,
                        insertText: "write var addr",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "text_out",
                        kind: monaco.languages.CompletionItemKind.Function,
                        insertText: "text_out a",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "text_out_line",
                        kind: monaco.languages.CompletionItemKind.Function,
                        insertText: "text_out_line"
                    },

                    {
                        label: "text_out_var",
                        kind: monaco.languages.CompletionItemKind.Function,
                        insertText: "text_out_var var",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "text_clear",
                        kind: monaco.languages.CompletionItemKind.Function,
                        insertText: "text_clear"
                    },

                    // SNIPPETS
                    {
                        label: "math",
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: "a = b + c;",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    },

                    {
                        label: "block",
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: "{\n\t \n}",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertTextRuleInsertAsSnippet
                    }
                ]
            };
        }
    });

    // ------------------------------------
    // CREATE EDITOR
    // ------------------------------------
    window.editor = monaco.editor.create(
        document.getElementById("editor"),
        {
            value: `// Nicpu-F Example

let x = 10;
let y = 20;
let z = 1;

while x < y {

    x = x + z;

}

return;
`,
            language: "nicpuf",
            theme: "nicpufTheme",
            automaticLayout: true,
            fontSize: 16,
            minimap: { enabled: false }
        }
    );

});
</script>

<script>

//
// =====================================================
// YOUR ORIGINAL COMPILER (UNCHANGED - EXACT COPY)
// =====================================================
//

function compileCode(){

    let src =
        editor.getValue();

    let output =
        document.getElementById("output");

    let errorBox =
        document.getElementById("error");

    output.textContent = "";
    errorBox.textContent = "";

    //------------------------------------
    // compiler state
    //------------------------------------

    let asm = [];

    let vars = {};

    let nextReg = 1;
    let nextMem = 0;

    let blocks = [];

    //------------------------------------
    // helpers
    //------------------------------------

    function emit(x){
        asm.push(x);
    }

    function clean(line){

        if(line.includes("//"))
            line = line.split("//")[0];

        return line.trim();
    }

    function allocVar(name){

        if(vars[name])
            return;

        vars[name] = {
            reg: "R" + nextReg,
            mem: nextMem
        };

        nextReg++;
        nextMem++;
    }

    //------------------------------------
    // compile
    //------------------------------------

    let lines = src.split("\n");

    try{

        for(let i=0;i<lines.length;i++){

            let line =
                clean(lines[i]);

            if(line == "")
                continue;

            line =
                line.replace(/;/g,"");

            //--------------------------------
            // let
            //--------------------------------

            if(line.startsWith("let ")){

                let p =
                    line.split(" ");

                let name =
                    p[1];

                let value =
                    parseInt(p[3]);

                allocVar(name);

                let reg =
                    vars[name].reg;

                let mem =
                    vars[name].mem;

                let upper =
                    (value >> 8) & 255;

                let lower =
                    value & 255;

                emit(
                    `IMP R1 ${upper} ${lower}`
                );

                emit(
                    `STORE ${mem} ${reg}`
                );
            }

            //--------------------------------
            // asm
            //--------------------------------

            if(line.startsWith("asm ")){

                let p =
                    line.split(" ");

                let v1 = p[1];
                let v2 = p[2];
                let v3 = p[3];
                let v4 = p[4];

                emit(
                    `${v1} ${v2} ${v3} ${v4}`
                );
            }

            //--------------------------------
            // read
            //--------------------------------

            else if(line.startsWith("read ")){

                let p =
                    line.split(" ");

                let left = p[1];
                let right = p[2];

                let r1 =
                    vars[left].reg;

                emit(
                    `load ${right} ${r1}`
                );
            }

            //--------------------------------
            // write
            //--------------------------------

            else if(line.startsWith("write ")){

                let p =
                    line.split(" ");

                let left = p[1];
                let right = p[2];

                let r1 =
                    vars[left].reg;

                emit(
                    `STORE ${r1} ${right}`
                );
            }

            //--------------------------------
            // text_out
            //--------------------------------

            else if(line.startsWith("text_out ")){

                let p =
                    line.split(" ");

                let left = p[1];

                emit(
                    `imp r17 ${left.charCodeAt(0)} // print`
                );
                emit(
                    `imp r17 0   // reset text out`
                );
            }

            //--------------------------------
            // text_out_line
            //--------------------------------

            else if(line.startsWith("text_out_line")){

                emit(
                    `imp r17 13 // print`
                );
                emit(
                    `imp r17 0   // reset text out`
                );
            }

            //--------------------------------
            // text_out_var
            //--------------------------------

            else if(line.startsWith("text_out_var ")){

                let p =
                    line.split(" ");

                let left = p[1];

                let r1 =
                    vars[left].reg;

                emit(
                    `load 17 ${r1}`
                );
                emit(
                    `imp r17 0   // reset text out`
                );
            }

            //--------------------------------
            // text_clear
            //--------------------------------

            else if(line.startsWith("text_clear")){

                emit(
                    `imp r18 0   // clr screen`
                );
                emit(
                    `imp r18 0   // stop clr screen`
                );
            }

            //--------------------------------
            // return
            //--------------------------------

            else if(line == "return"){

                emit("JES");
            }

            //--------------------------------
            // math
            //--------------------------------

            else if(
                line.includes("=") &&
                (
                    line.includes("+") ||
                    line.includes("-") ||
                    line.includes("*") ||
                    line.includes("/")
                )
            ){

                let p =
                    line.split(" ");

                let dest =
                    p[0];

                let left =
                    p[2];

                let op =
                    p[3];

                let right =
                    p[4];

                let rDest =
                    vars[dest].reg;

                let rLeft =
                    vars[left].reg;

                let rRight =
                    vars[right].reg;

                emit(
                    `load R1 ${rLeft}`
                );

                emit(
                    `load R2 ${rRight}`
                );

                if(op == "+"){

                    emit(`ADD ${rDest} R1 R2`);
                }

                else if(op == "-"){

                    emit(`SUB ${rDest} R1 R2`);
                }

                else if(op == "*"){

                    emit(`MULT ${rDest} R1 R2`);
                }

                else if(op == "/"){

                    emit(`DEV ${rDest} R1 R2`);
                }

                emit(
                    `STORE ${vars[dest].mem} ${rDest}`
                );
            }

            //--------------------------------
            // while (UNCHANGED)
            //--------------------------------

            else if(line.startsWith("while ")){

                let loopLabel =
                    "__WHILE_" + i + "__";

                emit(loopLabel + ":");

                let p = line.split(" ");

                let left = p[1];
                let cmp = p[2];
                let right = p[3];

                let r1 = vars[left].reg;
                let r2 = vars[right].reg;

                emit(`load R1 ${r1}`);
                emit(`load R2 ${r2}`);

                if(cmp == "==") emit(`EQC R3 R1 R2`);
                else if(cmp == ">") emit(`GTC R3 R1 R2`);
                else if(cmp == "<") emit(`LTC R3 R1 R2`);

                let jumpIndex = asm.length;

                emit(`BEQZ 0 R3 0`);

                blocks.push({
                    type:"while",
                    startLabel:loopLabel,
                    jumpIndex:jumpIndex
                });
            }
            //--------------------------------
            // while (UNCHANGED)
            //--------------------------------

            else if(line.startsWith("if ")){

                let loopLabel =
                    "__if_" + i + "__";

                emit(loopLabel + ":");

                let p = line.split(" ");

                let left = p[1];
                let cmp = p[2];
                let right = p[3];

                let r1 = vars[left].reg;
                let r2 = vars[right].reg;

                emit(`load R1 ${r1}`);
                emit(`load R2 ${r2}`);

                if(cmp == "==") emit(`EQC R3 R1 R2`);
                else if(cmp == ">") emit(`GTC R3 R1 R2`);
                else if(cmp == "<") emit(`LTC R3 R1 R2`);

                let jumpIndex = asm.length;

                emit(`BEQZ 0 R3 0`);

                blocks.push({
                    type:"if",
                    startLabel:loopLabel,
                    jumpIndex:jumpIndex
                });
            }
            //--------------------------------
            // block end
            //--------------------------------

            else if(line == "}"){
                let block = blocks.pop();

                if(block.type == "while"){

                    let startAddr = -1;

                    for(let j=0;j<asm.length;j++){

                        if(asm[j] == block.startLabel + ":"){
                            startAddr = j;
                            break;
                        }
                    }

                    emit(`JUMP R0 ${startAddr}`);

                    let endAddr = asm.length;

                    asm[block.jumpIndex] =
                        `BEQZ ${endAddr} R3 0`;
                }
                else if(block.type == "if"){

                    let startAddr = -1;

                    for(let j=0;j<asm.length;j++){

                        if(asm[j] == block.startLabel + ":"){
                            startAddr = j;
                            break;
                        }
                    }

                   

                    let endAddr = asm.length;

                    asm[block.jumpIndex] =
                        `BEQZ ${endAddr} R3 0`;
                }
            }
        }

        asm = asm.filter(x => !x.endsWith(":"));

        emit("HALT");

        output.textContent =
            asm.join("\n");

    }
    catch(err){

        errorBox.textContent =
            "Compiler Error:\n\n" + err;
    }
}

</script>

</body>
</html>
