<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nilomat-studios Cpu F compilers</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }

    .frame-box {
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
    }

    .frame-title {
      padding: 10px;
      background: #222;
      border-bottom: 1px solid #333;
      font-weight: bold;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 1000px;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

  <h1>Nilomat-studios Cpu F compilers</h1>

  <div class="grid">

    <!-- HTML FILE 1 -->
    <div class="frame-box">
      <div class="frame-title">ni asm f compiler</div>
      <iframe src="temp_view.html"></iframe>
    </div>

    <!-- HTML FILE 2 -->
    <div class="frame-box">
      <div class="frame-title">f++ compiler</div>
      <iframe src="data.html"></iframe>
    </div>


  </div>

</body>
</html>
